# Publish the dashboard/ folder to GitHub Pages (free for public repos).
# Bookmark: https://trustyandrew.github.io/cyber-ai-assurance-radar/
#
# Deploys on: a human push to main, AND after the "Daily dashboard" workflow
# finishes (workflow_run), so the bookmark refreshes after each daily build.
# (A push made by the Actions bot does not re-trigger workflows, hence workflow_run.)
name: Deploy dashboard to Pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Daily dashboard"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard
      - id: deployment
        uses: actions/deploy-pages@v4
