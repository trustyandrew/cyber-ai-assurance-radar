# Weekly newsletter build. Activates once this repo is on GitHub.
# 22:00 UTC Thursday = 08:00 AEST Friday (Melbourne). See DST note in
# daily-dashboard.yml.
name: Weekly newsletter

on:
  schedule:
    - cron: "0 22 * * 4"   # Friday 08:00 Australia/Melbourne (AEST)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build weekly newsletter
        run: python src/run.py weekly

      - name: Commit newsletter
        run: |
          git config user.name  "assurance-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/weekly/
          git diff --cached --quiet || git commit -m "Weekly newsletter $(date -u +%Y-%m-%d)"
          git push
