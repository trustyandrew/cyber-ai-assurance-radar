# Standards register — the curated SC 27 / SC 42 radar tables.
#
# This is a MANUALLY MAINTAINED watch-list, not auto-fetched. ISO/IEC publishes no
# usable machine feed for stage changes, so Andrew curates this. Seeded from the
# design mock-up (25 Jun 2026). VERIFY each edition/stage at iso.org before relying
# on it — the pipeline does not assert publication facts, it renders this register.
#
# status_class: published | dev   (controls the badge colour)

sc27:
  - designation: "ISO/IEC 27001:2022 + Amd 1:2024"
    area: "ISMS requirements"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/27001"
    why: "Core assurance anchor; the climate-action amendment is useful context for integrated management systems."
  - designation: "ISO/IEC 27002:2022"
    area: "Information security controls"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/75652.html"
    why: "Control library for ISO 27001 Annex A interpretation, policy rationalisation and audit evidence."
  - designation: "ISO/IEC 27005:2022"
    area: "Information security risk management"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/80585.html"
    why: "Risk-process bridge between the ISMS, cyber resilience, supplier risk and AI-enabled system risk."
  - designation: "ISO/IEC 27006-1:2024"
    area: "ISMS certification bodies"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/82908.html"
    why: "Important for certification integrity, audit bodies and assurance-market commentary."
  - designation: "ISO/IEC 27017"
    area: "Cloud information security controls"
    status: "Under development (revision)"
    status_class: dev
    url: "https://www.iso.org/standard/43757.html"
    why: "Watch for alignment to current cloud, SaaS, shared-responsibility and sovereign-cloud assurance."
  - designation: "ISO/IEC 27018:2025"
    area: "PII protection in public clouds"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/76559.html"
    why: "Useful for SaaS privacy, processor obligations and customer assurance packs."
  - designation: "ISO/IEC 27701:2025"
    area: "Privacy information management systems"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/85819.html"
    why: "Bridge between the ISMS, privacy, Australian Privacy Act reform and AI data governance."
  - designation: "ISO/IEC 27565:2026"
    area: "Privacy preservation / zero-knowledge proofs"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/committee/45306.html"
    why: "Niche but relevant to PETs, digital identity, verifiable credentials and sensitive AI use cases."
  - designation: "ISO/IEC 15408 series:2026"
    area: "IT security evaluation / Common Criteria"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/72891.html"
    why: "Not 27000, but SC 27-relevant for formal product/security assurance conversations."

