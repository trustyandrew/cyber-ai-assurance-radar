# Standards register — the curated SC 27 / SC 42 radar tables.
#
# Manually maintained watch-list (ISO/IEC publishes no machine feed for stage changes).
# VERIFIED against iso.org catalogue + IEC webstore / national bodies on 2026-06-26.
# Note: iso.org blocks automated fetches, so stage codes were confirmed via ISO's OBP
# metadata and the IEC mirror rather than a live render — re-check any DIS/FDIS/CD/AWI
# item before external publication, as AI-standard stages move quickly.
#
# status_class: published | dev   (controls the badge colour)

sc27:
  - designation: "ISO/IEC 27000:2018"
    area: "ISMS overview and vocabulary"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/73906.html"
    why: "Defines the vocabulary for the whole ISMS family — the normative terms used in 27001 audits and certification scope statements (free from ISO)."
  - designation: "ISO/IEC 27001:2022 (+ Amd 1:2024)"
    area: "ISMS requirements"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/27001"
    why: "Core assurance anchor. Amendment 1 (2024) adds climate-action considerations to clauses 4.1/4.2; base edition remains 2022."
  - designation: "ISO/IEC 27002:2022"
    area: "Information security controls"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/75652.html"
    why: "Control library (93 controls, 4 themes) for ISO 27001 Annex A interpretation, policy rationalisation and audit evidence."
  - designation: "ISO/IEC 27004:2016"
    area: "ISMS monitoring, measurement, analysis and evaluation"
    status: "Published (revision underway)"
    status_class: published
    url: "https://www.iso.org/standard/64120.html"
    why: "Guidance for ISO 27001 clause 9.1 performance evaluation — the metrics and effectiveness evidence auditors look for. A DIS revision is in progress."
  - designation: "ISO/IEC 27005:2022"
    area: "Information security risk management"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/80585.html"
    why: "Risk-process bridge between the ISMS, cyber resilience, supplier risk and AI-enabled system risk; aligned to 27001:2022 and ISO 31000."
  - designation: "ISO/IEC 27006-1:2024"
    area: "Requirements for ISMS certification bodies"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/82908.html"
    why: "Certification-integrity baseline for audit bodies; the two-year transition concluded around March 2026."
  - designation: "ISO/IEC 27007:2020"
    area: "Guidelines for ISMS auditing"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/77802.html"
    why: "How-to for planning and conducting ISMS audits (first/second party); complements the 27006-1 third-party certification requirements."
  - designation: "ISO/IEC 27017:2015"
    area: "Cloud information security controls"
    status: "Published (2nd ed. at FDIS)"
    status_class: published
    url: "https://www.iso.org/standard/43757.html"
    why: "Current in-force edition is 2015; the 2nd edition is at FDIS (publication expected 2026). Watch for alignment to current cloud/SaaS/sovereign-cloud assurance."
  - designation: "ISO/IEC 27018:2025"
    area: "PII protection in public clouds"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/88150.html"
    why: "3rd edition (Aug 2025), aligned to 27002:2022 with a new Annex B; useful for SaaS privacy, processor obligations and customer assurance packs."
  - designation: "ISO/IEC 27035-1:2023"
    area: "Information security incident management (principles and process)"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/78973.html"
    why: "Underpins 27001/27002 incident controls; the detect/report/respond/learn process assessed in audits and expected under DORA, GDPR and APRA CPS 234."
  - designation: "ISO/IEC 27701:2025"
    area: "Privacy information management systems (PIMS)"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/27701.html"
    why: "2nd edition (Oct 2025) — now a standalone, independently certifiable PIMS (no longer a 27001 extension). Bridges ISMS, privacy and Privacy Act reform. Transition ~Oct 2028."
  - designation: "ISO/IEC 27565:2026"
    area: "Privacy preservation using zero-knowledge proofs"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/80398.html"
    why: "Edition 1 (Feb 2026). Relevant to PETs, digital identity, verifiable credentials and sensitive AI use cases."
  - designation: "ISO/IEC 15408 series:2026"
    area: "IT security evaluation / Common Criteria (parts 1-5)"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/88134.html"
    why: "5th edition, parts published Apr-May 2026 (superseding the 2022 edition). SC 27-relevant for formal product/security assurance and Common Criteria certificates."

sc42:
  - designation: "ISO/IEC 22989:2022"
    area: "AI concepts and terminology"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/74296.html"
    why: "Foundational AI vocabulary normatively referenced across SC 42 (incl. 42001); consistent definitions for AI assurance. (Gen-AI amendment in progress.)"
  - designation: "ISO/IEC 23894:2023"
    area: "AI risk management guidance"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/77304.html"
    why: "The AI-specific companion to ISO 31000 and the de-facto reference for AI risk management; underpins risk treatment in ISO/IEC 42001 audits."
  - designation: "ISO/IEC 5338:2023"
    area: "AI system life cycle processes"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/81118.html"
    why: "Defines the AI system life cycle (built on 15288/12207) — the process backbone that V&V, data-quality and impact-assessment work hang off."
  - designation: "ISO/IEC 42001:2023"
    area: "AI management system"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/42001"
    why: "Anchor for responsible AI governance — internal audit, management review and continual improvement. World's first AI management system standard."
  - designation: "ISO/IEC AWI 42003"
    area: "Implementation guidance for ISO/IEC 42001"
    status: "Under development (AWI)"
    status_class: dev
    url: "https://www.iso.org/standard/91021.html"
    why: "Practical AIMS implementation guidance; early stage (preparatory). Likely a key implementation playbook once published."
  - designation: "ISO/IEC 42005:2025"
    area: "AI system impact assessment"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/42005"
    why: "Maps directly to use-case triage, impact assessment, benefits/harms and risk evidence; Annex A maps to ISO/IEC 42001."
  - designation: "ISO/IEC 42006:2025"
    area: "Requirements for bodies auditing/certifying AIMS"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/42006"
    why: "Published (Jul 2025) — turns AI management systems into a certification and assessor-competence conversation. Builds on ISO/IEC 17021-1."
  - designation: "ISO/IEC DIS 42007"
    area: "AI conformity assessment schemes"
    status: "Under development (DIS)"
    status_class: dev
    url: "https://www.iso.org/standard/89967.html"
    why: "DIS ballot registered Jun 2026. May shape AI assurance market models beyond management-system certification; supplementary to ISO/IEC 17067."
  - designation: "ISO/IEC TS 42119-2:2025"
    area: "Testing of AI systems (overview)"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/84127.html"
    why: "First publication in the AI-testing series; relevant to model/system validation, QA, safety, robustness and assurance evidence."
  - designation: "ISO/IEC DTS 42119-3.2"
    area: "Verification and validation analysis of AI systems"
    status: "Under development (DTS)"
    status_class: dev
    url: "https://www.iso.org/standard/85072.html"
    why: "High value for model assurance and AI lifecycle testing once published; currently at draft TS ballot."
  - designation: "ISO/IEC 5259-5:2025"
    area: "Data quality governance framework (analytics/ML)"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/84150.html"
    why: "Useful for AI data governance, training-data quality and auditability."
  - designation: "ISO/IEC TR 5259-6:2026"
    area: "Data quality visualisation framework"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/86532.html"
    why: "Technical Report (May 2026); useful where AI data observability or reporting is in scope."
  - designation: "ISO/IEC 12792:2025"
    area: "Transparency taxonomy of AI systems"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/84111.html"
    why: "Relevant to explainability, transparency statements, public-sector AI and user-facing disclosure (e.g. EU AI Act Art. 13)."
  - designation: "ISO/IEC TS 6254:2025"
    area: "Explainability and interpretability of ML/AI"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/82148.html"
    why: "Technical Specification (Sep 2025); objectives and approaches for explainability — useful for responsible AI control design and assurance language."
  - designation: "ISO/IEC TR 5469:2024"
    area: "Functional safety and AI systems"
    status: "Published"
    status_class: published
    url: "https://www.iso.org/standard/81283.html"
    why: "Bridges AI with classical functional safety (IEC 61508, ISO 26262); high value for clients deploying AI in safety-related functions."
  - designation: "ISO/IEC DIS 42105"
    area: "Guidance for human oversight of AI systems"
    status: "Under development (DIS)"
    status_class: dev
    url: "https://www.iso.org/standard/86902.html"
    why: "High newsletter value; aligns with public-sector responsible AI and EU-style control expectations. (iso.org shows DIS; a national mirror shows FDIS — re-check.)"
  - designation: "ISO/IEC CD TS 25568"
    area: "Guidance on risks in generative AI systems"
    status: "Under development (CD)"
    status_class: dev
    url: "https://www.iso.org/standard/90754.html"
    why: "Track for agentic AI, public LLMs, prompt injection, model governance and procurement advice."
  - designation: "ISO/IEC AWI 25870"
    area: "Data elements for reporting AI system incidents"
    status: "Under development (AWI)"
    status_class: dev
    url: "https://www.iso.org/standard/91804.html"
    why: "Connects AI governance with incident, breach, safety and regulator reporting; early stage."
  - designation: "ISO/IEC AWI TS 25864"
    area: "Resilience assessment of AI systems"
    status: "Under development (AWI)"
    status_class: dev
    url: "https://www.iso.org/standard/91831.html"
    why: "Model/system resilience framing alongside cyber resilience; early stage (SC 42/WG 3)."
